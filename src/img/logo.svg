<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 100" fill="none">
  <!-- Chimney -->
  <rect x="60" y="16" width="9" height="24" fill="#5A2438"/>
  <!-- Alpine chalet roof -->
  <path d="M 4 52 L 50 10 L 96 52 Z" fill="#6D2E46"/>
  <!-- Eave shadow -->
  <rect x="4" y="49" width="92" height="5" fill="#5A2438" opacity="0.5"/>
  <!-- House body -->
  <rect x="16" y="54" width="60" height="32" fill="#F8F4EF"/>
  <!-- Left window -->
  <rect x="22" y="61" width="14" height="12" rx="1.5" fill="#FF6B6B" opacity="0.9"/>
  <line x1="29" y1="61" x2="29" y2="73" stroke="white" stroke-width="1.8"/>
  <line x1="22" y1="67" x2="36" y2="67" stroke="white" stroke-width="1.8"/>
  <!-- Right window -->
  <rect x="40" y="61" width="14" height="12" rx="1.5" fill="#FF6B6B" opacity="0.9"/>
  <line x1="47" y1="61" x2="47" y2="73" stroke="white" stroke-width="1.8"/>
  <line x1="40" y1="67" x2="54" y2="67" stroke="white" stroke-width="1.8"/>
  <!-- Arched door -->
  <path d="M 58 86 L 58 74 A 7 7 0 0 1 72 74 L 72 86 Z" fill="#6D2E46"/>
  <!-- Ground -->
  <rect x="0" y="86" width="100" height="4" fill="#E8DED7"/>
  <!-- Pine tree -->
  <rect x="80" y="82" width="4" height="8" fill="#C4956A"/>
  <path d="M 71 86 L 82 71 L 93 86 Z" fill="#7A9E7E"/>
  <path d="M 73 78 L 82 64 L 91 78 Z" fill="#7A9E7E"/>
  <path d="M 75 69 L 82 57 L 89 69 Z" fill="#8FB39A"/>

  <!-- Divider -->
  <line x1="114" y1="20" x2="114" y2="80" stroke="#E8DED7" stroke-width="1"/>

  <!-- Brand name -->
  <text x="130" y="52"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-size="26"
        fill="#6D2E46">Amor y Aventura</text>

  <!-- TOURS -->
  <text x="133" y="74"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        fill="#E07A5F"
        letter-spacing="6"
        font-weight="600">TOURS</text>
</svg>
