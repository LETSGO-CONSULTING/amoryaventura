<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 100" fill="none">
  <!-- Chimney -->
  <rect x="60" y="16" width="9" height="24" fill="rgba(255,255,255,0.6)"/>
  <!-- Alpine chalet roof -->
  <path d="M 4 52 L 50 10 L 96 52 Z" fill="white"/>
  <!-- Eave shadow -->
  <rect x="4" y="49" width="92" height="5" fill="rgba(255,255,255,0.3)"/>
  <!-- House body -->
  <rect x="16" y="54" width="60" height="32" fill="rgba(255,255,255,0.25)"/>
  <!-- Left window -->
  <rect x="22" y="61" width="14" height="12" rx="1.5" fill="rgba(255,255,255,0.7)"/>
  <line x1="29" y1="61" x2="29" y2="73" stroke="white" stroke-width="1.8" opacity="0.4"/>
  <line x1="22" y1="67" x2="36" y2="67" stroke="white" stroke-width="1.8" opacity="0.4"/>
  <!-- Right window -->
  <rect x="40" y="61" width="14" height="12" rx="1.5" fill="rgba(255,255,255,0.7)"/>
  <line x1="47" y1="61" x2="47" y2="73" stroke="white" stroke-width="1.8" opacity="0.4"/>
  <line x1="40" y1="67" x2="54" y2="67" stroke="white" stroke-width="1.8" opacity="0.4"/>
  <!-- Arched door -->
  <path d="M 58 86 L 58 74 A 7 7 0 0 1 72 74 L 72 86 Z" fill="rgba(255,255,255,0.5)"/>
  <!-- Ground -->
  <rect x="0" y="86" width="100" height="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Pine tree -->
  <rect x="80" y="82" width="4" height="8" fill="rgba(255,255,255,0.5)"/>
  <path d="M 71 86 L 82 71 L 93 86 Z" fill="rgba(255,255,255,0.75)"/>
  <path d="M 73 78 L 82 64 L 91 78 Z" fill="rgba(255,255,255,0.75)"/>
  <path d="M 75 69 L 82 57 L 89 69 Z" fill="rgba(255,255,255,0.85)"/>

  <!-- Divider -->
  <line x1="114" y1="20" x2="114" y2="80" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>

  <!-- Brand name -->
  <text x="130" y="52"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-size="26"
        fill="white">Amor y Aventura</text>

  <!-- TOURS -->
  <text x="133" y="74"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        fill="rgba(255,255,255,0.8)"
        letter-spacing="6"
        font-weight="600">TOURS</text>
</svg>
