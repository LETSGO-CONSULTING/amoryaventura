version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: amoryaventura
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: amoryaventura
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U amoryaventura']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://amoryaventura:secret@db:5432/amoryaventura
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      CULQI_SECRET_KEY: ${CULQI_SECRET_KEY:-sk_test_placeholder}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  pgdata:
